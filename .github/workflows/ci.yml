name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  bypassrls:
    name: Check BYPASSRLS
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Check app_user BYPASSRLS via VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            git config --global --add safe.directory /var/www/saas_scaffolding
            cd /var/www/saas_scaffolding
            git pull origin main
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            npm ci
            doppler run -- npm run ci:bypassrls

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, bypassrls]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            git config --global --add safe.directory /var/www/saas_scaffolding
            cd /var/www/saas_scaffolding
            git pull origin main
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            npm ci
            cd packages/backend && doppler run -- npx prisma migrate deploy && cd /var/www/saas_scaffolding
            doppler run -- docker compose up -d --build